<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lumi Memory Admin</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
      --bg: #0f1117;
      --surface: #171a22;
      --surface-2: #1f2430;
      --text: #e6e9ef;
      --muted: #98a2b3;
      --ok: #2ecc71;
      --error: #ff6b6b;
      --accent: #7aa2f7;
      --border: #30384a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      background: var(--surface);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 16px 20px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button,
    select,
    input {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .primary {
      background: #2f3b54;
      border-color: #506089;
    }

    .status {
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 42vh;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0c0f14;
      color: var(--text);
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.35;
      resize: vertical;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .grow {
      flex: 1;
      min-height: 0;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-right: 6px;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <h1>Lumi Memory Admin</h1>
    <p>Local admin page for chatbot memory on this host machine.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Runtime State Editor</h2>

      <div class="toolbar">
        <button id="loadBtn">Load from DB</button>
        <button id="saveBtn" class="primary">Save to DB</button>
        <button id="formatBtn">Format JSON</button>
        <button id="blankBtn">New Blank Snapshot</button>
        <span class="meta" id="stateSummary"></span>
      </div>

      <div id="stateStatus" class="status"></div>

      <textarea id="stateEditor" class="grow" spellcheck="false" aria-label="Chatbot runtime state JSON"></textarea>

      <div class="meta">
        Uses <a href="/state" target="_blank" rel="noreferrer">/state</a> for channel runtime snapshots.
      </div>
    </section>

    <section class="panel">
      <h2>Per-User SQL Explorer</h2>

      <div class="toolbar">
        <button id="refreshUsersBtn">Refresh Users</button>
        <span class="label">User</span>
        <select id="userSelect" aria-label="Select user"></select>
        <span class="meta" id="userSummary"></span>
      </div>

      <div class="toolbar">
        <span class="label">Limit</span>
        <input id="userLimit" type="number" min="1" max="500" value="100" aria-label="Entry limit">
        <button id="loadUserBtn">Load Latest Rows</button>
      </div>

      <div class="toolbar">
        <input id="userQuery" type="text" placeholder="Search selected user's memory..." aria-label="Search selected user memory" style="min-width:240px;flex:1;">
        <button id="searchUserBtn">Search User</button>
        <button id="clearUserBtn">Clear View</button>
      </div>

      <div id="userStatus" class="status"></div>

      <textarea id="userEditor" class="grow" spellcheck="false" aria-label="Per-user memory explorer JSON"></textarea>

      <div class="meta">
        Uses <a href="/memory/users" target="_blank" rel="noreferrer">/memory/users</a> and
        <code>/memory/user/{userId}?limit=100</code>.
      </div>
    </section>
  </main>

  <script>
    const stateStatusElement = document.getElementById('stateStatus');
    const stateSummaryElement = document.getElementById('stateSummary');
    const stateEditor = document.getElementById('stateEditor');

    const userStatusElement = document.getElementById('userStatus');
    const userSummaryElement = document.getElementById('userSummary');
    const userSelect = document.getElementById('userSelect');
    const userLimitInput = document.getElementById('userLimit');
    const userQueryInput = document.getElementById('userQuery');
    const userEditor = document.getElementById('userEditor');

    let knownUsers = [];

    function setStatus(element, message, kind = '') {
      element.className = `status ${kind}`.trim();
      element.textContent = message;
    }

    function setStateStatus(message, kind = '') {
      setStatus(stateStatusElement, message, kind);
    }

    function setUserStatus(message, kind = '') {
      setStatus(userStatusElement, message, kind);
    }

    function updateStateSummary(state) {
      const channelCount = Object.keys(state?.channels || {}).length;
      const settingsCount = Object.keys(state?.settings || {}).length;
      stateSummaryElement.textContent = `Channels: ${channelCount} • Settings: ${settingsCount}`;
    }

    function updateUserListSummary(users) {
      const entryCount = users.reduce((sum, user) => sum + (Number(user.entryCount) || 0), 0);
      userSummaryElement.textContent = `Users: ${users.length} • Entries: ${entryCount}`;
    }

    function parseEditorJson() {
      const raw = stateEditor.value.trim();
      if (!raw) {
        return { channels: {}, settings: {} };
      }

      return JSON.parse(raw);
    }

    function normalizeExplorerLimit() {
      const parsed = Number.parseInt(userLimitInput.value, 10);
      const limit = Number.isFinite(parsed) ? parsed : 100;
      const normalized = Math.min(500, Math.max(1, limit));
      userLimitInput.value = String(normalized);
      return normalized;
    }

    function getSelectedUserId() {
      return String(userSelect.value || '').trim();
    }

    async function apiJson(path, options = {}) {
      const response = await fetch(path, options);
      const payload = await response.json().catch(() => null);
      if (!response.ok) {
        throw new Error(payload?.error || `Request failed (${response.status})`);
      }
      return payload;
    }

    async function loadState() {
      setStateStatus('Loading runtime state…');

      const payload = await apiJson('/state', {
        method: 'GET',
        headers: { accept: 'application/json' },
      });

      stateEditor.value = JSON.stringify(payload, null, 2);
      updateStateSummary(payload);
      setStateStatus('Loaded runtime state from database.', 'ok');
    }

    async function saveState() {
      let snapshot;
      try {
        snapshot = parseEditorJson();
      } catch (error) {
        setStateStatus(`Invalid JSON: ${error.message}`, 'error');
        return;
      }

      setStateStatus('Saving runtime state…');
      await apiJson('/state', {
        method: 'PUT',
        headers: { 'content-type': 'application/json', accept: 'application/json' },
        body: JSON.stringify(snapshot),
      });

      stateEditor.value = JSON.stringify(snapshot, null, 2);
      updateStateSummary(snapshot);
      setStateStatus('Saved runtime state to database.', 'ok');
    }

    function formatStateJson() {
      try {
        const parsed = parseEditorJson();
        stateEditor.value = JSON.stringify(parsed, null, 2);
        updateStateSummary(parsed);
        setStateStatus('Formatted runtime state JSON.', 'ok');
      } catch (error) {
        setStateStatus(`Invalid JSON: ${error.message}`, 'error');
      }
    }

    function setBlankSnapshot() {
      const blank = { channels: {}, settings: {} };
      stateEditor.value = JSON.stringify(blank, null, 2);
      updateStateSummary(blank);
      setStateStatus('Loaded blank runtime snapshot in editor (not saved yet).');
    }

    function renderUserOptions(users, preferredUserId = '') {
      const previous = preferredUserId || getSelectedUserId();
      userSelect.innerHTML = '';

      if (users.length === 0) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No users found';
        userSelect.append(option);
        userSelect.disabled = true;
        return '';
      }

      userSelect.disabled = false;
      users.forEach((user) => {
        const option = document.createElement('option');
        option.value = user.userId;
        option.textContent = `${user.userId} (${user.entryCount})`;
        if (user.userId === previous) {
          option.selected = true;
        }
        userSelect.append(option);
      });

      if (!userSelect.value && users[0]) {
        userSelect.value = users[0].userId;
      }

      return getSelectedUserId();
    }

    function updateSelectedUserSummary(payload) {
      const shown = Array.isArray(payload?.entries) ? payload.entries.length : 0;
      const total = Number(payload?.totalEntries) || 0;
      const tableName = payload?.tableName || 'n/a';
      userSummaryElement.textContent = `User: ${payload?.userId || 'n/a'} • Showing: ${shown}/${total} • Table: ${tableName}`;
    }

    async function refreshUsers(options = {}) {
      setUserStatus('Loading per-user memory registry…');
      const payload = await apiJson('/memory/users', {
        method: 'GET',
        headers: { accept: 'application/json' },
      });

      knownUsers = Array.isArray(payload?.users) ? payload.users : [];
      const selectedUser = renderUserOptions(knownUsers, options.preferredUserId || '');
      updateUserListSummary(knownUsers);

      if (!selectedUser) {
        userEditor.value = JSON.stringify({ users: [] }, null, 2);
        setUserStatus('No per-user memory rows found yet.');
        return;
      }

      if (options.autoLoad === false) {
        setUserStatus('Loaded per-user memory registry.', 'ok');
        return;
      }

      await loadSelectedUser();
    }

    async function loadSelectedUser() {
      const userId = getSelectedUserId();
      if (!userId) {
        setUserStatus('Select a user first.', 'error');
        return;
      }

      const limit = normalizeExplorerLimit();
      setUserStatus(`Loading latest rows for ${userId}…`);

      const payload = await apiJson(`/memory/user/${encodeURIComponent(userId)}?limit=${limit}`, {
        method: 'GET',
        headers: { accept: 'application/json' },
      });

      userEditor.value = JSON.stringify(payload, null, 2);
      updateSelectedUserSummary(payload);
      const loaded = Array.isArray(payload.entries) ? payload.entries.length : 0;
      setUserStatus(`Loaded ${loaded} rows for ${userId}.`, 'ok');
    }

    async function searchSelectedUser() {
      const userId = getSelectedUserId();
      if (!userId) {
        setUserStatus('Select a user first.', 'error');
        return;
      }

      const query = userQueryInput.value.trim();
      if (!query) {
        setUserStatus('Enter search text or use Load Latest Rows.', 'error');
        return;
      }

      const limit = normalizeExplorerLimit();
      setUserStatus(`Searching memory for ${userId}…`);

      const payload = await apiJson('/memory/search', {
        method: 'POST',
        headers: { 'content-type': 'application/json', accept: 'application/json' },
        body: JSON.stringify({
          userId,
          query,
          deep: false,
          limit,
        }),
      });

      userEditor.value = JSON.stringify(payload, null, 2);
      const matches = Array.isArray(payload?.matches) ? payload.matches.length : 0;
      userSummaryElement.textContent = `User: ${userId} • Matches: ${matches} • Limit: ${limit}`;
      setUserStatus(`Found ${matches} matching rows for ${userId}.`, 'ok');
    }

    function clearUserView() {
      userQueryInput.value = '';
      userEditor.value = JSON.stringify({ entries: [] }, null, 2);
      if (knownUsers.length > 0) {
        updateUserListSummary(knownUsers);
      } else {
        userSummaryElement.textContent = '';
      }
      setUserStatus('Cleared explorer output.');
    }

    document.getElementById('loadBtn').addEventListener('click', () => {
      loadState().catch((error) => {
        setStateStatus(error.message, 'error');
      });
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      saveState().catch((error) => {
        setStateStatus(error.message, 'error');
      });
    });

    document.getElementById('formatBtn').addEventListener('click', formatStateJson);
    document.getElementById('blankBtn').addEventListener('click', setBlankSnapshot);

    document.getElementById('refreshUsersBtn').addEventListener('click', () => {
      refreshUsers({ autoLoad: false }).catch((error) => {
        setUserStatus(error.message, 'error');
      });
    });

    document.getElementById('loadUserBtn').addEventListener('click', () => {
      loadSelectedUser().catch((error) => {
        setUserStatus(error.message, 'error');
      });
    });

    document.getElementById('searchUserBtn').addEventListener('click', () => {
      searchSelectedUser().catch((error) => {
        setUserStatus(error.message, 'error');
      });
    });

    document.getElementById('clearUserBtn').addEventListener('click', clearUserView);

    userSelect.addEventListener('change', () => {
      loadSelectedUser().catch((error) => {
        setUserStatus(error.message, 'error');
      });
    });

    setBlankSnapshot();
    clearUserView();

    loadState().catch((error) => {
      setStateStatus(error.message, 'error');
    });

    refreshUsers().catch((error) => {
      setUserStatus(error.message, 'error');
    });
  </script>
</body>
</html>
